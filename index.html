<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Free Game</title>
  <link rel="stylesheet" href="./css/global.css">
  <link rel="stylesheet" href="./css/header.css">
  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./css/footer.css">
  <link rel="stylesheet" href="./css/sidebar.css">
  <link rel="stylesheet" href="./css/search.css">
  <link rel="stylesheet" href="./css/showLoading.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="icon" href="./images/favicon.png">
  <style>
    ins.adsbygoogle[data-ad-status="unfilled"] {
      display: none !important;
    }
  </style>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="./js/google/ad-manager.js"></script>
</head>

<body>
  <div class="app-container">
    <div class="main-wrapper">
      <header class="top-bar">
        <div class="header-content">
          <div class="header-left">
            <a href="./index.html" class="logo">
              <div class="logo-icon"></div>
              <span class="logo-text">Free Game</span>
            </a>
          </div>
          <div class="nav-container">
            <div class="nav-arrow left-arrow"><i class="fas fa-chevron-left"></i></div>
            <nav class="main-nav">
              <a href="./index.html" class="nav-item">Home</a>
            </nav>
            <div class="nav-arrow right-arrow"><i class="fas fa-chevron-right"></i></div>
          </div>
          <div class="header-right">
            <div class="search-container">
              <i class="fas fa-search search-icon"></i>
              <input type="text" id="searchInput" class="search-input" placeholder="Search game">
              <button id="searchBtn" style="display:none;"></button>
            </div>
            <div class="mobile-search-icon">
              <i class="fas fa-search"></i>
            </div>
            <div class="theme-select-wrapper">
              <div class="theme-select-trigger">Dark</div>
              <div class="theme-options">
                <div class="theme-option" data-value="light">Light</div>
                <div class="theme-option" data-value="dark">Dark</div>
                <div class="theme-option" data-value="pink">Pink</div>
              </div>
            </div>
          </div>
        </div>
        <div class="mobile-category-nav">
          <a href="./index.html" class="mobile-nav-item">Home</a>
        </div>
      </header>
      <div class="ad-placeholder-top">
        <!-- 动态加载广告 -->
      </div>
      <div class="content-area">

        <!-- Dynamic content will be loaded here -->
      </div>

      <footer class="footer">
        <div class="footer-links">
          <a href="./agreement/users.html">Terms of Service</a>
          <a href="./agreement/privacy.html">Privacy Policy</a>
        </div>
        <p>&copy; 2024 Free Game. All rights reserved.</p>
      </footer>
    </div>
  </div>

  <div class="top_lea">
    <img src="./images/goTop.png" alt="Go Top" />
  </div>

  <div class="searchBox">
    <div class="main">
      <div class="closeIconSearch">
        <i class="fas fa-times" style="font-size: 24px; color: #fff; cursor: pointer;"></i>
      </div>
      <h2>Search</h2>
      <div class="searchMain">
        <input type="text" id="mobileSearchInput" placeholder="Search">
        <button id="mobileSearchBtn">
          <i class="fas fa-search" style="color: rgba(255,255,255,0.6);"></i>
        </button>
      </div>
      <div id="searchPage">
        <h3>Hot</h3>
        <ul class="games_list">
          <!-- 动态加载游戏列表 -->
        </ul>
      </div>
    </div>
  </div>

  <div id="loadingMask">
    <div class="loading-content">
      <div class="spinner"></div>
      <p>Loading...</p>
    </div>
  </div>

  <script src="./js/switchBg.js"></script>
  <script src="./js/common.js"></script>
  <script src="./js/index.js"></script>
  <script src="./js/main.js"></script>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-9ZDPXP0C33"></script>
  <script src="./js/google/ga.js"></script>
  <script src="./js/google/openscreen.js"></script>
</body>

</html>
